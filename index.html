<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIGUME - Ultra Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* الأساسيات المتطورة */
:root {
  --primary: #38bdf8;
  --accent: #818cf8;
  --salla: #00d5a5; /* لون هوية سلة */
  --bg: #020617;
  --tile: rgba(15, 23, 42, 0.9);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --gradient: linear-gradient(135deg, #38bdf8, #818cf8, #00d5a5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--text-main);
  font-family: 'Cairo', sans-serif;
  overflow-x: hidden;
  height: 100vh;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

/* --- إضافة: إخفاء مشغل يوتيوب --- */
#youtube-player {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
}

/* خلفية جزيئات متطورة */
#particles-js {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* حاوية الشرائح */
.slide-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: clamp(20px, 5vw, 100px);
  position: relative;
  scroll-snap-align: start;
  z-index: 1;
}

/* رسوم متحركة مخصصة */
.animate-item {
    opacity: 0;
    transform: scale(0.95) translateY(40px);
    transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.active .animate-item {
    opacity: 1;
    transform: scale(1) translateY(0);
}

.delay-1 { transition-delay: 0.2s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.6s; }

/* التصميم البصري الفاخر */
h1 { font-size: clamp(45px, 12vw, 140px); font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; letter-spacing: -2px; }
.slide-title { font-size: clamp(28px, 4vw, 55px); font-weight: 900; color: var(--primary); margin-bottom: 30px; border-right: 10px solid var(--salla); padding-right: 25px; align-self: flex-start; }
p { font-size: clamp(16px, 1.8vw, 26px); color: var(--text-muted); line-height: 1.6; max-width: 1000px; text-align: justify; }

.tile { 
    background: var(--tile); 
    border: 1px solid rgba(56, 189, 248, 0.3); 
    border-radius: 30px; 
    padding: 40px; 
    backdrop-filter: blur(20px); 
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    transition: 0.4s;
}
.tile:hover { border-color: var(--salla); transform: translateY(-5px); }

.grid { display: grid; gap: 30px; width: 100%; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }

/* شريط التقدم الفاخر */
.progress-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 8px;
    background: rgba(255,255,255,0.05);
    z-index: 2000;
}
.progress-bar {
    height: 100%;
    background: var(--gradient);
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 15px var(--primary);
}

/* أزرار التنقل */
.nav-controls {
    position: fixed;
    bottom: 40px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 1001;
}

.nav-btn {
    width: 60px; height: 60px;
    border-radius: 20px;
    background: var(--tile);
    border: 2px solid var(--primary);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.nav-btn:hover { background: var(--gradient); color: white; transform: rotate(10deg) scale(1.1); border-color: transparent; }

/* شارة سلة */
.salla-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 213, 165, 0.15);
    border: 1px solid var(--salla);
    padding: 10px 20px;
    border-radius: 50px;
    color: var(--salla);
    font-weight: bold;
    margin-top: 20px;
}

.feature-icon { font-size: 60px; margin-bottom: 25px; display: block; }
.glow-text { text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }

    </style>
</head>
<body>

<div id="youtube-player"></div>

<div id="particles-js"></div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

<div class="nav-controls">
    <button class="nav-btn" onclick="moveSlide(-1)"><i class="fa-solid fa-chevron-up"></i></button>
    <button class="nav-btn" onclick="moveSlide(1)"><i class="fa-solid fa-chevron-down"></i></button>
    <button class="nav-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-pause"></i></button>
</div>

<section class="slide-container" id="page1">
    <h1 class="animate-item glow-text">LEORES</h1>
    <p class="animate-item delay-1">الجيل القادم من تخليد اللحظات بدقة 8K</p>
    <div class="salla-badge animate-item delay-2">
        <i class="fa-solid fa-shop"></i> الان ننتقل الى مرحله جديده
    </div>
</section>

<section class="slide-container" id="page2">
    <h2 class="slide-title animate-item">رؤية 2030 التقنية</h2>
    <div class="tile animate-item delay-1">
        <p>نهدف إلى تحويل الفن التقليدي إلى تجربة رقمية-مادية متكاملة، حيث يصبح كل مجسم بوابة لذكرى لا تموت، مستخدمين تقنيات النحت الرقمي الأكثر تقدماً في العالم.</p>
    </div>
</section>

<section class="slide-container" id="page15">
    <h1 class="animate-item glow-text">ابدأ قصتك</h1>
    <p class="animate-item delay-1">تحفتك الفنية تنتظرك في متجرنا</p>
    <div class="animate-item delay-2" style="margin-top: 50px;">
        <button class="tile" style="padding: 15px 40px; font-weight: 900; color: var(--salla); cursor: pointer;" onclick="playYouTubeMusic()">
            ادعمنا عبر LEORES الآن
        </button>
    </div>
</section>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
    // --- إضافة: منطق موسيقى يوتيوب ---
    let ytPlayer;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            videoId: 'https://www.youtube.com/watch?v=I34bTKW8ud0&list=PLLELmi94d_Vk6qOPUYUMsLdC5VjUyEqH4&index=1', // استبدل هذا الكود بكود الفيديو الخاص بك
            playerVars: {
                'autoplay': 0,
                'controls': 0
            }
        });
    }

    function playYouTubeMusic() {
        if (ytPlayer && ytPlayer.playVideo) {
            ytPlayer.playVideo();
        }
    }

    // تهيئة الجزيئات المتطورة (كودك الأصلي)
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 120, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#38bdf8", "#818cf8", "#00d5a5"] },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.4, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 120, "color": "#38bdf8", "opacity": 0.1, "width": 1 },
            "move": { "enable": true, "speed": 1.2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "bubble" }, "onclick": { "enable": true, "mode": "push" } },
            "modes": { "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.8 } }
        }
    });

    const slides = Array.from(document.querySelectorAll('.slide-container'));
    let currentSlide = 0;
    let autoPlay = true;
    let timer;

    function moveSlide(direction) {
        currentSlide += direction;
        if (currentSlide >= slides.length) currentSlide = 0;
        if (currentSlide < 0) currentSlide = slides.length - 1;
        
        slides[currentSlide].scrollIntoView({ behavior: 'smooth' });
    }

    function updateProgress() {
        const percent = ((currentSlide + 1) / slides.length) * 100;
        const pb = document.getElementById('progressBar');
        if(pb) pb.style.width = percent + '%';
    }

    function togglePlay() {
        autoPlay = !autoPlay;
        const btn = document.getElementById('playBtn');
        if(btn) btn.innerHTML = autoPlay ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
    }

    function startTimer() {
        timer = setInterval(() => { if (autoPlay) moveSlide(1); }, 8000);
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
                currentSlide = slides.indexOf(entry.target);
                updateProgress();
            }
        });
    }, { threshold: 0.6 });

    slides.forEach(s => observer.observe(s));
    startTimer();

    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowDown") { moveSlide(1); autoPlay = false; togglePlay(); }
        if (e.key === "ArrowUp") { moveSlide(-1); autoPlay = false; togglePlay(); }
    });
</script>

</body>
</html>
